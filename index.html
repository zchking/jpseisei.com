<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精誠株式会社 | Coming Soon</title>
    <meta name="description" content="精誠株式会社 - 近日公開。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Noto+Serif+JP:wght@300;400;500&family=Jura:wght@300;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --secondary-color: #b3b3b3;
            --accent-color: #d4af37;
            /* Subtle metallic gold */
            --bg-color-1: #060709;
            --bg-color-2: #13171c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-color-2) 0%, var(--bg-color-1) 100%);
            color: var(--primary-color);
            font-family: 'Noto Serif JP', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated background grid */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            opacity: 0.5;
            animation: panBg 40s linear infinite;
        }

        @keyframes panBg {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(40px);
            }
        }

        /* Glowing orb for central depth */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .coming-soon-wrapper {
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .coming-soon-en {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 0.4em;
            margin-right: -0.4em;
            /* Compensate for letter-spacing on last letter */
            font-weight: 400;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.8rem;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .coming-soon-jp {
            font-size: 0.95rem;
            letter-spacing: 0.4em;
            color: var(--accent-color);
            margin-right: -0.4em;
            opacity: 0.85;
            font-weight: 300;
        }

        .divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            margin: 3.5rem auto;
            opacity: 0;
            animation: expandLine 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .company-header {
            opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
            margin-bottom: 2.5rem;
        }

        .company-name {
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-right: -0.2em;
            color: var(--primary-color);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }

        .company-info {
            opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            font-family: 'Jura', sans-serif;
            font-size: 1rem;
            color: var(--secondary-color);
            letter-spacing: 0.08em;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: color 0.3s ease;
        }

        .info-item:hover {
            color: var(--primary-color);
        }

        .info-icon {
            color: var(--accent-color);
            font-size: 1.1rem;
            opacity: 0.7;
            font-family: 'Noto Serif JP', serif;
            font-weight: 300;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandLine {
            0% {
                width: 0;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                width: 140px;
                opacity: 0.4;
            }
        }

        /* Abstract elegant rings */
        .shape {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        .shape-1 {
            width: 50vw;
            height: 50vw;
            top: -25vw;
            right: -15vw;
            animation: rotate 50s linear infinite;
            border-top-color: rgba(212, 175, 55, 0.15);
            border-right-color: rgba(212, 175, 55, 0.05);
        }

        .shape-2 {
            width: 40vw;
            height: 40vw;
            bottom: -20vw;
            left: -10vw;
            animation: rotate 40s linear infinite reverse;
            border-bottom-color: rgba(255, 255, 255, 0.1);
            border-left-color: rgba(255, 255, 255, 0.05);
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
            }

            .info-item {
                flex-direction: column;
                gap: 0.4rem;
                font-size: 0.9rem;
            }

            .info-icon {
                display: none;
            }

            .divider {
                margin: 2.5rem auto;
            }

            .shape {
                opacity: 0.5;
            }

            .bg-grid {
                background-size: 30px 30px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <div class="coming-soon-wrapper">
            <h1 class="coming-soon-en">Coming Soon</h1>
            <div class="coming-soon-jp">近日公開</div>
        </div>

        <div class="divider"></div>

        <div class="company-header">
            <h2 class="company-name">精誠株式会社</h2>
        </div>

        <div class="company-info">
            <div class="info-item">
                <span class="info-icon">〒</span>
                <span>557-0052 大阪府大阪市西成区潮路一丁目3番6号606室</span>
            </div>
            <div class="info-item">
                <span class="info-icon">TEL</span>
                <span>080-9834-8296 (Japan)</span>
            </div>
        </div>
    </div>
</body>

</html>
